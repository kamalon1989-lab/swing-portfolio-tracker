<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스윙 포트폴리오 트래커</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js"></script>
<!-- 트레이딩뷰 위젯 스크립트 로드 -->
<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<style>
/* ── THEME VARIABLES ── */
:root {
  --bg: #f0f2f5; --card: #fff; --border: #e5e7eb;
  --text: #111827; --sub: #6b7280;
  --green: #16a34a; --red: #dc2626; --blue: #2563eb;
  --orange: #ea580c; --amber: #d97706;
  --r: 12px; --hover-bg: #fafafa;
}
[data-theme="dark"] {
  --bg: #111827; --card: #1f2937; --border: #374151;
  --text: #f9fafb; --sub: #9ca3af;
  --green: #22c55e; --red: #ef4444; --blue: #3b82f6;
  --hover-bg: #374151;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; min-height: 100vh; transition: background 0.3s, color 0.3s; }

/* ── HEADER ── */
.app-header { background: var(--card); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100; transition: background 0.3s; }
.app-title { font-size: 17px; font-weight: 700; color: var(--text); }
.app-date { font-size: 11px; color: var(--sub); white-space: nowrap; }
.tabs { display: flex; gap: 2px; background: var(--bg); border-radius: 8px; padding: 3px; }
.tab-btn { padding: 6px 14px; border: none; background: transparent; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; color: var(--sub); transition: all .15s; }
.tab-btn.active { background: var(--card); color: var(--blue); box-shadow: 0 1px 3px rgba(0,0,0,.1); }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.toggle-btn { display: flex; align-items: center; gap: 6px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 5px 10px; cursor: pointer; font-size: 12px; font-weight: 500; color: var(--sub); transition: all .15s; }
.toggle-btn.on { background: #eff6ff; border-color: #bfdbfe; color: #2563eb; }
[data-theme="dark"] .toggle-btn.on { background: #1e3a8a; border-color: #1d4ed8; color: #93c5fd; }

.price-status { font-size: 11px; color: var(--sub); white-space: nowrap; }
.price-status .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #9ca3af; margin-right: 4px; vertical-align: middle; }
.price-status .dot.live { background: var(--green); animation: blink 2s infinite; }
.price-status .dot.fail { background: var(--red); }
.price-status .dot.warn { background: var(--amber); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ── BUTTONS ── */
.btn { padding: 7px 13px; border-radius: 8px; border: none; font-size: 13px; font-weight: 500; cursor: pointer; transition: all .15s; white-space: nowrap; }
.btn-primary { background: var(--blue); color: #fff; } .btn-primary:hover { opacity: 0.9; }
.btn-secondary { background: var(--bg); color: var(--text); border: 1px solid var(--border); } .btn-secondary:hover { opacity: 0.8; }
.btn-danger { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; } [data-theme="dark"] .btn-danger { background: #450a0a; color: #f87171; border-color: #7f1d1d; }
.btn-success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }[data-theme="dark"] .btn-success { background: #052e16; color: #4ade80; border-color: #14532d; }
.btn-sm { padding: 5px 10px; font-size: 12px; }

/* ── LAYOUT & CARDS ── */
.container { max-width: 1240px; margin: 0 auto; padding: 18px 20px; }
.tab-content { display: none; } .tab-content.active { display: block; }
.cards { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 16px; }
.card { background: var(--card); border-radius: var(--r); padding: 14px 16px; box-shadow: 0 1px 3px rgba(0,0,0,.07); transition: background 0.3s; }
.card-label { font-size: 11px; color: var(--sub); margin-bottom: 5px; font-weight: 500; }
.card-value { font-size: 20px; font-weight: 700; line-height: 1.2; }
.card-sub { font-size: 11px; margin-top: 3px; }
.card.cash-card { border: 2px dashed var(--border); cursor: pointer; }
.card.cash-card:hover { border-color: var(--blue); }
.c-blue{color:var(--blue)} .c-green{color:var(--green)} .c-red{color:var(--red)} .c-gray{color:var(--sub)}

/* ── SECTION ── */
.section { background: var(--card); border-radius: var(--r); padding: 18px; box-shadow: 0 1px 3px rgba(0,0,0,.07); margin-bottom: 14px; transition: background 0.3s; }
.section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.section-title { font-size: 14px; font-weight: 600; }
.section-note { font-size: 11px; color: var(--sub); }

/* AI Section styling */
.ai-section { border: 1px solid #bfdbfe; background: #eff6ff; }[data-theme="dark"] .ai-section { border-color: #1e3a8a; background: #0f172a; }
.ai-content { font-size: 13.5px; line-height: 1.6; color: var(--text); padding: 12px 16px; border-radius: 8px; background: var(--card); border: 1px solid var(--border); min-height: 60px; margin-top: 10px; }
.ai-content strong { color: var(--blue); }

/* Market State Badges */
.mstate { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 12px; }
.mstate-open   { background: #dcfce7; color: var(--green); }[data-theme="dark"] .mstate-open { background: #052e16; color: #4ade80; }
.mstate-pre    { background: #fef9c3; color: var(--amber); } [data-theme="dark"] .mstate-pre { background: #78350f; color: #fcd34d; }
.mstate-post   { background: #ffedd5; color: var(--orange); }[data-theme="dark"] .mstate-post { background: #7c2d12; color: #fdba74; }
.mstate-closed { background: var(--bg); color: var(--sub); }

/* ── TABLE ── */
table { width: 100%; border-collapse: collapse; }
thead th { text-align: right; font-size: 11px; color: var(--sub); font-weight: 500; padding: 0 6px 9px; white-space: nowrap; transition: color 0.2s; border-bottom: 1px solid var(--border); }
thead th:first-child { text-align: left; padding-left: 0; }
thead th.sortable { cursor: pointer; user-select: none; }
thead th.sortable:hover { color: var(--text); text-decoration: underline; }
tbody td { text-align: right; padding: 10px 6px; border-bottom: 1px solid var(--bg); font-size: 13px; }
tbody td:first-child { text-align: left; padding-left: 0; }
.tick { font-weight: 700; color: var(--blue); font-size: 14px; display:flex; align-items:center; gap:6px; }
.tick-arrow { font-size:10px; color:var(--sub); opacity:0.5; transition: transform 0.2s; }
.cname { font-size: 10px; color: var(--sub); margin-top: 2px; }

/* ── ROW ACCORDION UI ── */
.main-row { cursor: pointer; transition: background 0.15s; }
.main-row:hover { background: var(--hover-bg); }
.main-row.open { background: var(--hover-bg); }
.main-row.open .tick-arrow { transform: rotate(180deg); }
.detail-row td { padding: 0 !important; border: none !important; }
.detail-wrap { display: flex; gap: 16px; padding: 20px 24px; background: #f8fafc; border-bottom: 1px solid var(--border); box-shadow: inset 0 4px 6px -4px rgba(0,0,0,0.05); height: 350px; }
[data-theme="dark"] .detail-wrap { background: #0f172a; box-shadow: inset 0 4px 6px -4px rgba(0,0,0,0.3); }

/* Detail Wrap Layout */
.tv-box { flex: 2.2; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); background: var(--card); }
.fund-box { flex: 1.1; display: flex; flex-direction: column; gap: 12px; }
.fund-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.fund-item { background: var(--card); border: 1px solid var(--border); padding: 14px; border-radius: 8px; display: flex; flex-direction: column; gap: 5px; box-shadow: 0 1px 2px rgba(0,0,0,0.02); }
.fund-item span { font-size: 11px; color: var(--sub); font-weight: 500; }
.fund-item strong { font-size: 16px; font-weight: 700; color: var(--text); }

/* Progress & Badges (TP/SL) */
.sl-tp-wrap { display: flex; flex-direction: column; gap: 3px; align-items: flex-end; }
.sl-tp-bar { width: 80px; height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; position: relative; }
.sl-tp-fill { height: 100%; border-radius: 3px; transition: width .4s; }
.sl-tp-label { font-size: 10px; font-weight:500; }
.badge-alert { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 600; margin-top:2px; }
.badge-target { background: #dcfce7; color: #16a34a; }[data-theme="dark"] .badge-target { background: #052e16; color: #4ade80; }
.badge-sl { background: #fee2e2; color: #dc2626; }[data-theme="dark"] .badge-sl { background: #450a0a; color: #f87171; }
.w-wrap { display: flex; align-items: center; gap: 5px; justify-content: flex-end; }
.w-bar { width: 44px; height: 5px; background: var(--bg); border-radius: 3px; overflow: hidden; }
.w-fill { height: 100%; background: var(--blue); border-radius: 3px; }

/* ── CHARTS GRID ── */
.grid-3 { display: grid; grid-template-columns: 1.5fr 0.8fr 1.2fr; gap: 14px; }
.chart-wrap { height: 190px; position: relative; display: flex; align-items: center; justify-content: center; }
.hist-scroll { max-height: 190px; overflow-y: auto; }
.hist-scroll table thead { position: sticky; top: 0; background: var(--card); z-index: 1; }

/* ── FORMS / MODALS ── */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 200; align-items: center; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal { background: var(--card); border-radius: 16px; padding: 24px; width: 480px; max-width: 95vw; box-shadow: 0 20px 60px rgba(0,0,0,.3); max-height: 90vh; overflow-y: auto; }
.modal h2 { font-size: 16px; font-weight: 700; margin-bottom: 18px; color: var(--text); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 12px; color: var(--sub); margin-bottom: 5px; font-weight: 500; }
.form-group input, .form-group select, .form-group textarea { width: 100%; padding: 9px 11px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; font-family: inherit; color: var(--text); background: var(--bg); }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--blue); }
.form-group .hint { font-size: 11px; color: var(--sub); margin-top: 4px; }
.form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
.optional-label { font-size: 10px; color: var(--sub); background: var(--bg); padding: 1px 5px; border-radius: 4px; margin-left: 4px; }

/* ── JOURNAL FILTERS & MISC ── */
.journal-filters { display: flex; gap: 8px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
.j-badge { font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 4px; }
.j-buy  { background: #dbeafe; color: #2563eb; }[data-theme="dark"] .j-buy { background: #1e3a8a; color: #93c5fd; }
.j-sell { background: #fce7f3; color: #be185d; }[data-theme="dark"] .j-sell { background: #831843; color: #f9a8d4; }
.checkbox-wrap { display: flex; align-items: center; gap: 8px; margin-top: 10px; padding: 10px; background: var(--bg); border-radius: 8px; }
.checkbox-wrap input { width: 16px; height: 16px; cursor: pointer; }

.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1f2937; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 13px; opacity: 0; transition: opacity .25s; z-index: 400; pointer-events: none; }
.toast.show { opacity: 1; }
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 5px; }
@keyframes spin { to { transform: rotate(360deg); } }
.refresh-btn.spinning svg { animation: spin .7s linear infinite; }
</style>
</head>
<body>

<div class="app-header">
  <div><div class="app-title">📊 스윙 포트폴리오</div><div class="app-date" id="headerDate"></div></div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('portfolio')">포트폴리오</button>
    <button class="tab-btn" onclick="switchTab('watchlist')">관심 종목</button>
    <button class="tab-btn" onclick="switchTab('journal')">매매 일지</button>
  </div>
  <div class="header-right">
    <div class="price-status" id="priceStatus"><span class="dot" id="statusDot"></span><span id="statusText">-</span></div>
    <button class="btn btn-secondary refresh-btn btn-sm" id="refreshBtn" onclick="refreshPrices()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg> 새로고침
    </button>
    <button class="toggle-btn" id="krwToggle" onclick="toggleKRW()">₩ 원화</button>
    <button class="toggle-btn" onclick="toggleTheme()">🌙</button>
    <span id="cloudIndicator" style="font-size:11px;font-weight:500;margin-left:8px;"></span>
    <button class="btn btn-secondary btn-sm" onclick="exportData()">💾 백업</button>
    <button class="btn btn-secondary btn-sm" onclick="importData()">📂 불러오기</button>
    <button class="btn btn-secondary btn-sm" onclick="openCloudSetup()">☁️ 클라우드</button>
    <button class="btn btn-secondary btn-sm" onclick="openApiKeyModal()">🔑 API 설정</button>
    <button class="btn btn-primary btn-sm" onclick="openAddHolding()">＋ 보유 추가</button>
  </div>
</div>

<div class="container">
  <!-- TAB 1: PORTFOLIO -->
  <div class="tab-content active" id="tab-portfolio">
    <div class="cards">
      <div class="card"><div class="card-label">주식 평가금액</div><div class="card-value c-blue" id="c-stockVal">-</div><div class="card-sub c-gray" id="c-stockCost">매수 -</div></div>
      <div class="card"><div class="card-label">누적 손익</div><div class="card-value" id="c-totalPnl">-</div><div class="card-sub" id="c-totalPnlPct">-</div></div>
      <div class="card"><div class="card-label">오늘 손익</div><div class="card-value" id="c-dayPnl">-</div><div class="card-sub" id="c-dayPnlPct">-</div></div>
      <div class="card cash-card" onclick="focusCashInput()"><div class="card-label">예수금 (클릭하여 수정)</div><div class="card-value c-blue" id="c-cashVal">$0</div><div class="card-sub c-gray">투자 가능 현금</div></div>
      <div class="card" style="border:2px solid var(--blue);"><div class="card-label">총 자산 (주식+현금)</div><div class="card-value c-blue" id="c-totalAsset">-</div><div class="card-sub" id="c-totalAssetKrw" style="font-size:11px;color:var(--sub);">₩-</div></div>
    </div>

    <!-- AI SECTION (Portfolio) -->
    <div class="section ai-section">
      <div class="section-header" style="margin-bottom:0;">
        <span class="section-title">🤖 AI 포트폴리오 어드바이저</span>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-sm btn-primary" onclick="reqPortfolioAdvice()">💡 포트폴리오 진단</button>
          <button class="btn btn-sm btn-secondary" onclick="reqNewsSummary('holdings')">📰 주요 뉴스 요약</button>
        </div>
      </div>
      <div class="ai-content" id="ai-portfolio-out" style="display:none;"></div>
    </div>

    <div class="section" style="padding-bottom: 0;">
      <div class="section-header">
        <div style="display:flex;align-items:center;gap:10px;"><span class="section-title">💼 보유 종목</span><span id="marketStateBadge"></span></div>
        <div style="display:flex;gap:8px;align-items:center;"><span class="section-note" id="priceUpdatedAt"></span><button class="btn btn-sm btn-success" onclick="recordToday()">📌 오늘 기록 저장</button></div>
      </div>
      <div id="portfolioWrap" style="margin: 0 -18px;"></div>
    </div>
    
    <div class="grid-3">
      <div class="section"><div class="section-header"><span class="section-title">📈 자산 변동</span></div><div class="chart-wrap" id="chartContainer"></div></div>
      <div class="section"><div class="section-header"><span class="section-title">🍩 자산 비중</span></div><div class="chart-wrap" style="height:170px;"><canvas id="donutChart"></canvas></div></div>
      <div class="section"><div class="section-header"><span class="section-title">📁 히스토리</span><button class="btn btn-sm btn-danger" id="delLastBtn" style="display:none;" onclick="deleteLastRecord()">마지막 삭제</button></div><div class="hist-scroll" id="histWrap"></div></div>
    </div>
  </div>

  <!-- TAB 2: WATCHLIST -->
  <div class="tab-content" id="tab-watchlist">
    <!-- AI SECTION (Watchlist) -->
    <div class="section ai-section">
      <div class="section-header" style="margin-bottom:0;">
        <span class="section-title">🤖 AI 관심종목 뉴스 브리핑</span>
        <button class="btn btn-sm btn-primary" onclick="reqNewsSummary('watch')">📰 주요 뉴스 요약</button>
      </div>
      <div class="ai-content" id="ai-watch-out" style="display:none;"></div>
    </div>

    <div class="section" style="padding-bottom: 0;">
      <div class="section-header"><span class="section-title">👀 관심 종목</span><button class="btn btn-primary btn-sm" onclick="openAddWatchlist()">＋ 관심 추가</button></div>
      <div id="watchlistWrap" style="margin: 0 -18px;"></div>
    </div>
  </div>

  <!-- TAB 3: JOURNAL -->
  <div class="tab-content" id="tab-journal">
    <!-- AI SECTION (Journal) -->
    <div class="section ai-section">
      <div class="section-header" style="margin-bottom:0;">
        <span class="section-title">🤖 AI 매매 습관 코칭</span>
        <button class="btn btn-sm btn-primary" onclick="reqHabitAnalysis()">🔍 내 매매 패턴 분석</button>
      </div>
      <div class="ai-content" id="ai-journal-out" style="display:none;"></div>
    </div>

    <div class="section">
      <div class="section-header"><span class="section-title">📒 매매 일지</span><button class="btn btn-primary btn-sm" onclick="openAddTrade()">＋ 거래 추가</button></div>
      <div class="journal-filters">
        <select id="jFilterTicker" onchange="renderJournal()"><option value="">전체 종목</option></select>
        <select id="jFilterAction" onchange="renderJournal()"><option value="">매수/매도 전체</option><option value="buy">매수만</option><option value="sell">매도만</option></select>
        <input type="text" id="jFilterNote" placeholder="메모 검색..." oninput="renderJournal()" style="width:160px;">
        <span style="margin-left:auto;font-size:12px;color:var(--sub);" id="jSummaryLine"></span>
      </div>
      <div id="journalWrap"></div>
    </div>
  </div>
</div>

<!-- ══ MODALS ══ -->
<div class="modal-overlay" id="apiModal">
  <div class="modal" style="width:400px;">
    <h2>🔑 API 키 설정</h2>
    <div class="form-group"><label>📈 Finnhub API (주가/재무/뉴스 조회)</label><input id="api-finnhub" placeholder="무료 발급: finnhub.io"></div>
    <div class="form-group" style="margin-top:16px;"><label>🤖 Google Gemini API (AI 분석)</label><input id="api-gemini" placeholder="무료 발급: aistudio.google.com"><div class="hint">브라우저 로컬에만 안전하게 저장됩니다.</div></div>
    <div class="form-actions"><button class="btn btn-secondary" onclick="closeModal('apiModal')">취소</button><button class="btn btn-primary" onclick="saveApiKeys()">저장 후 조회</button></div>
  </div>
</div>

<div class="modal-overlay" id="holdingModal"><div class="modal"><h2 id="holdingModalTitle">종목 추가</h2><div class="form-row"><div class="form-group"><label>종목 코드</label><input id="hm-ticker" style="text-transform:uppercase;"></div><div class="form-group"><label>종목명 <span class="optional-label">선택</span></label><input id="hm-name"></div></div><div class="form-row"><div class="form-group"><label>수량 (주)</label><input id="hm-shares" type="number" step="1"></div><div class="form-group"><label>평균 매수가</label><input id="hm-avgcost" type="number" step="0.01"></div></div><div class="form-row"><div class="form-group"><label>🎯 목표가</label><input id="hm-target" type="number" step="0.01"></div><div class="form-group"><label>🔻 손절가</label><input id="hm-stoploss" type="number" step="0.01"></div></div><div class="form-actions"><button class="btn btn-secondary" onclick="closeModal('holdingModal')">취소</button><button class="btn btn-primary" onclick="saveHolding()">저장</button></div></div></div>

<!-- ══════════════════ SCRIPT ══════════════════ -->
<script>
// ─────────────────────────────────────────────
//  SINGLE APP STATE
// ─────────────────────────────────────────────
const K = { holdings:'ptf_h2', history:'ptf_hist', prices:'ptf_px', cash:'ptf_cash', journal:'ptf_journal', krw:'ptf_krw', watch:'ptf_watch', theme:'ptf_theme', key:'ptf_finnhub_key', gemini:'ptf_gemini_key', fb:'ptf_fb_url' };
const load = k => { try { return JSON.parse(localStorage.getItem(k) || 'null'); } catch { return null; } };
const save = (k, v) => { localStorage.setItem(k, JSON.stringify(v)); if(![K.prices, K.krw, K.theme].includes(k)) schedulePush(); };

const App = { krw: load(K.krw)||false, rate: 0, px: load(K.prices)||{}, fetched: false, editH: null, editW: null, editT: null, sort: 'curVal', asc: false, chartLine: null, chartDonut: null, openRow: null };

const $ = id => document.getElementById(id);
const today = () => new Date().toISOString().slice(0, 10);
const fmtUSD = n => '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtKRW = n => '₩' + Math.round(n).toLocaleString('ko-KR');
const fmtAmt = n => App.krw && App.rate ? fmtKRW(n * App.rate) : fmtUSD(n);
const fmtPct = n => (n >= 0 ? '+' : '') + Number(n).toFixed(2) + '%';
const cls   = n => n > 0 ? 'c-green' : (n < 0 ? 'c-red' : 'c-gray');
const uid   = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
function toast(msg, ms = 2500) { const el=$('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),ms); }

// ─────────────────────────────────────────────
//  THEME (DARK MODE)
// ─────────────────────────────────────────────
function initTheme() { document.documentElement.setAttribute('data-theme', load(K.theme) || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')); }
function toggleTheme() { 
  const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'; 
  document.documentElement.setAttribute('data-theme', next); 
  save(K.theme, next); 
  if (App.chartLine) renderChart(); 
  if (App.chartDonut) renderDonut(); 
  
  // 열려있는 아코디언 행이 있다면 닫고 다시 열어서 차트 테마 재적용
  if (App.openRow) {
    const [type, ticker] = App.openRow.split('-');
    App.openRow = null; 
    toggleRow(type, ticker);
  }
}
initTheme();

// ─────────────────────────────────────────────
//  API MODAL & FETCH (Finnhub)
// ─────────────────────────────────────────────
function openApiKeyModal() {
  $('api-finnhub').value = localStorage.getItem(K.key) || '';
  $('api-gemini').value = localStorage.getItem(K.gemini) || '';
  $('apiModal').classList.add('show');
}
function saveApiKeys() {
  localStorage.setItem(K.key, $('api-finnhub').value.trim());
  localStorage.setItem(K.gemini, $('api-gemini').value.trim());
  closeModal('apiModal'); refreshPrices(); toast('API 키 저장 완료!');
}

function detectMarketState() {
  const et = new Date(new Date().toLocaleString('en-US', { timeZone: 'America/New_York' })); const mins = et.getHours() * 60 + et.getMinutes();
  if (et.getDay() === 0 || et.getDay() === 6) return 'CLOSED';
  if (mins >= 570 && mins < 960) return 'REGULAR'; if (mins >= 240 && mins < 570) return 'PRE'; if (mins >= 960 && mins < 1200) return 'POST'; return 'CLOSED';
}

async function fetchFinnhub(ticker, apiKey) {
  try {
    const res = await fetch(`https://finnhub.io/api/v1/quote?symbol=${ticker}&token=${apiKey}`, { signal: AbortSignal.timeout(6000) });
    if(res.status===401) throw new Error('AUTH'); if(res.status===429) throw new Error('LIMIT'); if(!res.ok) throw new Error('HTTP');
    const d = await res.json(); if(d.c === undefined || d.c === null) throw new Error('INVALID');
    return { price: d.c, changePercent: d.dp || 0, prevClose: d.pc || d.c, name: ticker };
  } catch(e) { return { error: e.message || 'NET' }; }
}

async function refreshPrices() {
  const allTickers =[...new Set([...(load(K.holdings)||[]).map(x=>x.ticker), ...(load(K.watch)||[]).map(x=>x.ticker)])];
  if (allTickers.length === 0) return;
  const apiKey = localStorage.getItem(K.key); if (!apiKey) return openApiKeyModal();

  $('refreshBtn').classList.add('spinning');
  try {
    fetch('https://open.er-api.com/v6/latest/USD').then(r=>r.json()).then(d=> App.rate = d.rates.KRW).catch(()=>{});
    const results =[];
    for (let i = 0; i < allTickers.length; i += 5) {
      results.push(...await Promise.allSettled(allTickers.slice(i, i + 5).map(t => fetchFinnhub(t, apiKey).then(data => ({ ticker: t, data })))));
      if (i + 5 < allTickers.length) await new Promise(r => setTimeout(r, 200));
    }
    
    let sc = 0, fc = 0, err = null;
    results.forEach(res => {
      if (res.status === 'fulfilled' && res.value.data) {
        if (res.value.data.error) { fc++; err = res.value.data.error; } else { sc++; App.px[res.value.ticker] = res.value.data; }
      } else { fc++; err = 'NET'; }
    });

    const stored = load(K.prices) || {}; Object.keys(App.px).forEach(t => stored[t] = App.px[t]); save(K.prices, stored); App.fetched = true;

    const msLabel = detectMarketState() === 'REGULAR' ? '🟢 장중' : detectMarketState() === 'PRE' ? '🟡 프리마켓' : detectMarketState() === 'POST' ? '🟠 애프터마켓' : '⚫ 장마감';
    const timeStr = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
    
    if (err === 'AUTH') { setStatus('fail', 'API 키 오류'); toast('⚠️ Finnhub API 키 확인 필요'); }
    else if (err === 'LIMIT') { setStatus('warn', 'API 한도 초과'); }
    else if (fc > 0 && sc === 0) setStatus('fail', '조회 실패');
    else if (fc > 0) setStatus('warn', `${msLabel} · ${fc}개 실패`);
    else setStatus('live', `${msLabel} · ${timeStr}${App.rate ? ` · ₩${Math.round(App.rate).toLocaleString()}` : ''}`);
    
    $('marketStateBadge').innerHTML = `<span class="mstate mstate-${detectMarketState().toLowerCase().replace('regular','open')}">${msLabel}</span>`;
    render();
  } catch(e) { setStatus('fail', '조회 실패'); }
  $('refreshBtn').classList.remove('spinning');
}

function setStatus(c, t) { $('statusDot').className = 'dot ' + c; $('statusText').textContent = t; }
function toggleKRW() { App.krw = !App.krw; save(K.krw, App.krw); $('krwToggle').classList.toggle('on', App.krw); render(); }

// ─────────────────────────────────────────────
//  🤖 AI ADVISOR & NEWS SUMMARY (Gemini API)
// ─────────────────────────────────────────────
async function callGemini(prompt, outId) {
  const key = localStorage.getItem(K.gemini);
  if (!key) { openApiKeyModal(); return toast('⚠️ Gemini API 키를 먼저 입력해주세요'); }
  
  const out = $(outId); out.style.display = 'block';
  out.innerHTML = '<span class="spinner"></span> <strong>AI가 분석 중입니다...</strong>';
  
  const modelsToTry =['gemini-2.5-flash', 'gemini-2.0-flash', 'gemini-1.5-pro', 'gemini-pro'];
  let lastError = '';

  for (const model of modelsToTry) {
    try {
      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`, {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ contents:[{ parts:[{ text: prompt }] }] })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      
      let text = data.candidates[0].content.parts[0].text;
      text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
      out.innerHTML = `<div style="font-size:11px; color:var(--sub); margin-bottom:8px;">💡 AI 모델: ${model}</div>` + text;
      return; 
    } catch (e) { lastError = e.message; }
  }
  out.innerHTML = `<span style="color:var(--red);">⚠️ 구글 AI 서버 혼잡. 잠시 후 재시도 해주세요. (${lastError})</span>`;
}

function reqPortfolioAdvice() {
  const h = load(K.holdings)||[]; const cash = parseFloat(load(K.cash)||0);
  if (h.length === 0 && cash === 0) return toast('포트폴리오가 비어있습니다.');
  let summary = `현금: $${cash}\n보유 주식:\n`; h.forEach(x => { const px = App.px[x.ticker]?.price || x.avgCost; summary += `- ${x.ticker}: ${x.shares}주 (현재가 $${px}, 평단 $${x.avgCost})\n`; });
  const prompt = `너는 퀀트 애널리스트야. 내 포트폴리오야:\n\n${summary}\n\n1. 섹터/종목 편중 리스크 평가\n2. 현금 비중 적절성\n3. 조언 1가지를 명확히 짚어줘.`;
  callGemini(prompt, 'ai-portfolio-out');
}

async function fetchFinnhubNews(ticker) {
  const key = localStorage.getItem(K.key); if (!key) return '';
  const d = new Date(); const to = d.toISOString().slice(0, 10); d.setDate(d.getDate() - 3); const from = d.toISOString().slice(0, 10);
  try {
    const res = await fetch(`https://finnhub.io/api/v1/company-news?symbol=${ticker}&from=${from}&to=${to}&token=${key}`);
    const data = await res.json(); return data.slice(0, 3).map(n => n.headline).join(' | ');
  } catch { return ''; }
}

async function reqNewsSummary(type) {
  const list = type === 'holdings' ? (load(K.holdings)||[]) : (load(K.watch)||[]);
  if (list.length === 0) return toast('종목이 없습니다.');
  const outId = type === 'holdings' ? 'ai-portfolio-out' : 'ai-watch-out'; const out = $(outId); out.style.display = 'block'; out.innerHTML = '<span class="spinner"></span> <strong>뉴스 요약 중...</strong>';
  try {
    let newsRaw = '';
    for (const item of list) { const news = await fetchFinnhubNews(item.ticker); if (news) newsRaw += `[${item.ticker}] ${news}\n`; await new Promise(r => setTimeout(r, 200)); }
    if (!newsRaw) return out.innerHTML = '최근 3일 내 중요 뉴스가 없습니다.';
    const prompt = `주식 뉴스 요약가야. 최근 영문 뉴스 헤드라인이야:\n\n${newsRaw}\n\n'진짜 중요한 호재/악재'만 골라서 종목별로 2줄 이내로 한국어로 핵심만 요약해.`;
    callGemini(prompt, outId);
  } catch(e) { out.innerHTML = '⚠️ 요약 실패'; }
}

async function reqSingleNewsSummary(ticker, type) {
  const outId = `ai-single-out-${type}-${ticker}`; const out = $(outId); out.style.display = 'block'; out.innerHTML = '<span class="spinner"></span> <strong>분석 중...</strong>';
  try {
    const news = await fetchFinnhubNews(ticker);
    if (!news) { out.innerHTML = '최근 중요 뉴스가 없습니다.'; return; }
    const prompt = `[${ticker}]의 최근 뉴스야:\n${news}\n호재/악재를 파악해서 가장 핵심적인 내용만 2줄 이내로 한국어로 요약해.`;
    callGemini(prompt, outId);
  } catch(e) { out.innerHTML = '⚠️ 요약 실패'; }
}

function reqHabitAnalysis() {
  const j = load(K.journal)||[]; if (j.length < 3) return toast('매매 기록이 부족합니다 (최소 3건).');
  const summary = j.slice(-30).map(x => `- ${x.date} | ${x.action==='buy'?'매수':'매도'} | ${x.ticker} | 단가 $${x.price} | 수량 ${x.shares} | 메모: ${x.note||'없음'}`).join('\n');
  const prompt = `트레이딩 코치야. 내 최근 30건 매매 기록이야:\n\n${summary}\n\n1. 내 매매의 치명적 단점 (팩트폭행)\n2. 반복하는 잘못된 패턴\n3. 교정 팁 2가지를 말해줘.`;
  callGemini(prompt, 'ai-journal-out');
}

// ─────────────────────────────────────────────
//  ROW EXPANSION (ACCORDION) & FUNDAMENTALS
// ─────────────────────────────────────────────
async function toggleRow(type, ticker) {
  const rowId = `detail-${type}-${ticker}`;
  const wrapId = `wrap-${type}-${ticker}`;
  const tr = $(rowId);
  const wrap = $(wrapId);

  // 1. 이미 열려있는 창을 클릭했으면 닫기
  if (tr.style.display === 'table-row') {
    tr.style.display = 'none';
    $(`main-${type}-${ticker}`).classList.remove('open');
    App.openRow = null;
    wrap.innerHTML = ''; 
    return;
  }

  // 2. 다른 열려있는 창 닫기
  if (App.openRow) {
    const [prevType, prevTicker] = App.openRow.split('-');
    const prevTr = $(`detail-${prevType}-${prevTicker}`);
    if (prevTr) { 
      prevTr.style.display = 'none'; 
      $(`main-${prevType}-${prevTicker}`).classList.remove('open');
      $(`wrap-${prevType}-${prevTicker}`).innerHTML = ''; 
    }
  }

  // 3. 현재 창 열기 및 로딩 표시
  App.openRow = `${type}-${ticker}`;
  tr.style.display = 'table-row';
  $(`main-${type}-${ticker}`).classList.add('open');
  wrap.innerHTML = `<div style="text-align:center; width:100%; padding:80px; color:var(--sub);"><span class="spinner"></span> <strong>${ticker}</strong> 차트 및 데이터를 불러오는 중...</div>`;

  // 4. Finnhub 펀더멘탈 지표 호출
  const key = localStorage.getItem(K.key);
  let fund = { pe: '-', pb: '-', roe: '-', div: '-', h52: '-', l52: '-' };
  
  if (key) {
    try {
      const res = await fetch(`https://finnhub.io/api/v1/stock/metric?symbol=${ticker}&metric=all&token=${key}`);
      if (res.ok) {
        const d = await res.json();
        if (d && d.metric) {
          const m = d.metric;
          fund.pe = (m.peBasicExclExtraTTM || m.peNormalizedAnnual)?.toFixed(2) || 'N/A';
          fund.pb = m.pbAnnual?.toFixed(2) || 'N/A';
          fund.roe = m.roeTTM?.toFixed(2) ? m.roeTTM.toFixed(2) + '%' : 'N/A';
          fund.div = m.dividendYieldIndicatedAnnual?.toFixed(2) ? m.dividendYieldIndicatedAnnual.toFixed(2) + '%' : 'N/A';
          fund.h52 = m['52WeekHigh'] ? fmtUSD(m['52WeekHigh']) : 'N/A';
          fund.l52 = m['52WeekLow'] ? fmtUSD(m['52WeekLow']) : 'N/A';
        }
      }
    } catch(e) {}
  }

  // 5. 버튼 분기 처리 (보유종목 vs 관심종목)
  let actionBtns = '';
  if (type === 'holding') {
    actionBtns = `
      <button class="btn btn-sm btn-secondary" onclick="openEditHolding('${ticker}')">✏️ 수정</button>
      <button class="btn btn-sm btn-danger" onclick="deleteHoldingTicker('${ticker}')">🗑️ 삭제</button>
    `;
  } else {
    actionBtns = `
      <button class="btn btn-sm btn-secondary" onclick="openEditWatchlist('${ticker}')">✏️ 수정</button>
      <button class="btn btn-sm btn-danger" onclick="deleteWatchlist('${ticker}')">🗑️ 삭제</button>
    `;
  }

  // 6. UI 렌더링
  wrap.innerHTML = `
    <div class="tv-box" id="tv-box-${type}-${ticker}"></div>
    <div class="fund-box">
      <div class="fund-grid">
        <div class="fund-item"><span>PER (주가수익비율)</span><strong>${fund.pe}</strong></div>
        <div class="fund-item"><span>PBR (주가순자산비율)</span><strong>${fund.pb}</strong></div>
        <div class="fund-item"><span>ROE (자기자본이익률)</span><strong>${fund.roe}</strong></div>
        <div class="fund-item"><span>배당수익률</span><strong>${fund.div}</strong></div>
        <div class="fund-item"><span>52주 최고가</span><strong style="color:var(--green)">${fund.h52}</strong></div>
        <div class="fund-item"><span>52주 최저가</span><strong style="color:var(--red)">${fund.l52}</strong></div>
      </div>
      
      <div style="margin-top:auto; display:flex; gap:8px;">
        <button class="btn btn-sm btn-primary" onclick="reqSingleNewsSummary('${ticker}', '${type}')">🤖 AI 요약</button>
        ${actionBtns}
        <a href="https://kr.tradingview.com/chart/?symbol=${ticker}" target="_blank" class="btn btn-sm btn-secondary" style="margin-left:auto; text-decoration:none; background:var(--bg);">🔗 트레이딩뷰 열기</a>
      </div>
      
      <div class="ai-content" id="ai-single-out-${type}-${ticker}" style="display:none; margin-top:8px; font-size:12px; max-height:100px; overflow-y:auto;"></div>
    </div>
  `;

  // 7. TradingView 차트 위젯 삽입
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  new TradingView.widget({
    "autosize": true,
    "symbol": ticker,
    "interval": "D",
    "timezone": "Asia/Seoul",
    "theme": isDark ? "dark" : "light",
    "style": "1",
    "locale": "kr",
    "enable_publishing": false,
    "backgroundColor": isDark ? "#1f2937" : "#ffffff",
    "gridColor": isDark ? "#374151" : "#e5e7eb",
    "hide_top_toolbar": false,
    "hide_legend": false,
    "save_image": false,
    "container_id": `tv-box-${type}-${ticker}`
  });
}

// ─────────────────────────────────────────────

function setSort(key) { if (App.sort === key) App.asc = !App.asc; else { App.sort = key; App.asc = (key === 'ticker' || key === 'name'); } renderTable(); }
function sortIcon(key) { return App.sort === key ? (App.asc ? ' ▴' : ' ▾') : ''; }

function renderCards() {
  const h = load(K.holdings)||[]; const cash = parseFloat(load(K.cash)||0);
  let stockVal = 0, totalCost = 0, dayPnl = 0;
  h.forEach(x => { const px = App.px[x.ticker]; if (px && px.price) { stockVal += px.price * x.shares; dayPnl += (px.price - (px.prevClose||px.price)) * x.shares; } totalCost += x.avgCost * x.shares; });
  const tPnl = stockVal - totalCost; const dayPnlPct = (stockVal - dayPnl) > 0 ? (dayPnl / (stockVal - dayPnl)) * 100 : 0;
  
  $('c-stockVal').textContent = fmtAmt(stockVal); $('c-stockCost').textContent = '매수 ' + fmtAmt(totalCost);
  $('c-totalPnl').textContent = (tPnl>=0?'+':'') + fmtAmt(tPnl); $('c-totalPnl').className = 'card-value ' + cls(tPnl); $('c-totalPnlPct').textContent = fmtPct(totalCost? (tPnl/totalCost)*100 : 0);
  $('c-dayPnl').textContent = App.fetched ? (dayPnl>=0?'+':'') + fmtAmt(dayPnl) : '—'; $('c-dayPnl').className = 'card-value ' + (App.fetched ? cls(dayPnl) : 'c-gray'); $('c-dayPnlPct').textContent = App.fetched ? fmtPct(dayPnlPct) : '—'; $('c-dayPnlPct').className = 'card-sub ' + (App.fetched ? cls(dayPnlPct) : 'c-gray');
  $('c-cashVal').textContent = fmtAmt(cash); $('c-totalAsset').textContent = fmtAmt(stockVal + cash); $('c-totalAssetKrw').textContent = App.rate ? fmtKRW((stockVal + cash) * App.rate) : (App.krw ? '' : '₩ 환율 조회 대기중');
}

function renderTable() {
  const h = load(K.holdings)||[]; if (!h.length) { $('portfolioWrap').innerHTML = '<div style="text-align:center;padding:40px;">종목이 없습니다. 첫 종목을 추가해보세요!</div>'; $('marketStateBadge').innerHTML = ''; return; }

  rows.forEach(r => r.weight = totalVal ? (r.curVal / totalVal)*100 : 0);

      </tr></thead>

            let barHtml = ''; if (tp && sl && r.price > 0) { const range = tp - sl; const pct = range > 0 ? Math.min(100, Math.max(0, ((r.price - sl) / range) * 100)) : 50; const bColor = r.price >= tp ? 'var(--green)' : r.price <= sl ? 'var(--red)' : 'var(--blue)'; barHtml = `<div class="sl-tp-bar"><div class="sl-tp-fill" style="width:${pct.toFixed(0)}%;background:${bColor};"></div></div>`; }
            tpSlHtml = `<div class="sl-tp-wrap">${tp ? `<div class="sl-tp-label c-green">🎯 ${fmtUSD(tp)}</div>` : ''}${sl ? `<div class="sl-tp-label c-red">🔻 ${fmtUSD(sl)}</div>` : ''}${barHtml}${badge}</div>`;

  container.innerHTML = '<canvas id="histChart"></canvas>'; if(App.chartLine) App.chartLine.destroy();
  App.chartLine = new Chart($('histChart'), { type:'line', data:{labels:hist.map(h=>h.date.slice(5)), datasets:[{data:hist.map(h=>h.totalValue), borderColor:c.blue, borderWidth:2, pointRadius:2, tension:0.3}]}, options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales: { x:{ticks:{color:c.text}, grid:{display:false}}, y:{ticks:{color:c.text}, grid:{color:c.grid}} } } });

function recordToday() {
  let v = 0; (load(K.holdings)||[]).forEach(h=> v += (App.px[h.ticker]?.price||h.avgCost)*h.shares); v += parseFloat(load(K.cash)||0);

  let hist = load(K.history)||[]; const entry = {date:today(), totalValue: +v.toFixed(2)}; const idx = hist.findIndex(h => h.date === today());

function renderHistory() {

function openAddTrade() { App.editT=null; $('tradeModalTitle').textContent='거래 추가'; $('tm-date').value=today(); $('tm-action').value='buy';['tm-ticker','tm-shares','tm-price','tm-fee','tm-note'].forEach(id=>$(id).value=''); $('tm-sync-wrap').style.display = 'flex'; $('tm-sync').checked = false; $('tradeModal').classList.add('show'); }
function openEditTrade(id) { const j = (load(K.journal)||[]).find(x => x.id === id); if(!j) return; App.editT = id; $('tradeModalTitle').textContent='거래 수정'; $('tm-date').value=j.date; $('tm-action').value=j.action; $('tm-ticker').value=j.ticker; $('tm-shares').value=j.shares; $('tm-price').value=j.price; $('tm-fee').value=j.fee||''; $('tm-note').value=j.note||''; $('tm-sync-wrap').style.display = 'none'; $('tradeModal').classList.add('show'); }
function saveTrade() {
  const t=$('tm-ticker').value.toUpperCase().trim(), a=$('tm-action').value, s=parseFloat($('tm-shares').value), p=parseFloat($('tm-price').value), f=parseFloat($('tm-fee').value)||0; if(!t || !s || !p) return toast('필수값 확인');
  if ($('tm-sync').checked && !App.editT) { 
    let h = load(K.holdings)||[]; let c = parseFloat(load(K.cash)||0); const idx = h.findIndex(x=>x.ticker === t);
    if (a === 'buy') { c -= (p * s + f); if (idx >= 0) { const oV = h[idx].shares * h[idx].avgCost; h[idx].shares += s; h[idx].avgCost = (oV + (p * s)) / h[idx].shares; } else { h.push({ticker: t, shares: s, avgCost: p}); } }
    else { c += (p * s - f); if (idx >= 0) { h[idx].shares -= s; if (h[idx].shares <= 0) h.splice(idx, 1); } }
    save(K.holdings, h); save(K.cash, c);
  }
  let j = load(K.journal)||[]; const entry = {id: App.editT || uid(), date:$('tm-date').value, action:a, ticker:t, shares:s, price:p, fee:f, note:$('tm-note').value};
  if (App.editT) { const idx = j.findIndex(x => x.id === App.editT); if (idx >= 0) j[idx] = entry; } else j.push(entry);
  save(K.journal, j); closeModal('tradeModal'); render(); refreshPrices(); toast(App.editT ? '✅ 수정 완료' : '✅ 저장 완료');
}
function deleteTrade(id) { if (confirm('삭제할까요?')) { save(K.journal, (load(K.journal)||[]).filter(x => x.id !== id)); toast('🗑️ 삭제 완료'); renderJournal(); } }
function renderJournal() {
  const all = load(K.journal)||[]; const fT = $('jFilterTicker').value, fA = $('jFilterAction').value, fN = $('jFilterNote').value.toLowerCase();
  const tickers =[...new Set(all.map(j => j.ticker))].sort(); const sel = $('jFilterTicker'); const cur = sel.value;
  sel.innerHTML = '<option value="">전체 종목</option>' + tickers.map(t => `<option value="${t}" ${t===cur?'selected':''}>${t}</option>`).join('');
  let filtered = all.filter(j => (!fT || j.ticker === fT) && (!fA || j.action === fA) && (!fN || (j.note || '').toLowerCase().includes(fN))).sort((a, b) => b.date.localeCompare(a.date));
  const bA = filtered.filter(j=>j.action==='buy').reduce((s,j)=>s+j.price*j.shares+(j.fee||0),0); const sA = filtered.filter(j=>j.action==='sell').reduce((s,j)=>s+j.price*j.shares-(j.fee||0),0);
  $('jSummaryLine').textContent = filtered.length ? `${filtered.length}건 · 매수 ${fmtUSD(bA)} / 매도 ${fmtUSD(sA)}` : '';
  if (!filtered.length) { $('journalWrap').innerHTML = '<div style="text-align:center;padding:40px;color:var(--sub);">거래 기록이 없습니다.</div>'; return; }
  $('journalWrap').innerHTML = `<table><thead><tr><th style="text-align:left;">날짜</th><th>구분</th><th style="text-align:left;">종목</th><th>수량</th><th>단가</th><th>금액</th><th>수수료</th><th style="text-align:left;">메모</th><th>관리</th></tr></thead><tbody>${filtered.map(x=>`<tr><td style="text-align:left;font-size:12px;color:var(--sub)">${x.date}</td><td><span class="j-badge ${x.action==='buy'?'j-buy':'j-sell'}">${x.action==='buy'?'매수':'매도'}</span></td><td style="text-align:left"><strong>${x.ticker}</strong></td><td>${x.shares}</td><td>${fmtUSD(x.price)}</td><td class="${x.action==='buy'?'c-blue':'c-green'}"><strong>${x.action==='buy'?'-':'+'}${fmtUSD(x.shares*x.price)}</strong></td><td class="c-gray">${x.fee ? fmtUSD(x.fee) : '—'}</td><td style="text-align:left;font-size:11px;color:var(--sub)">${x.note||'—'}</td><td><button class="btn btn-sm btn-secondary" onclick="openEditTrade('${x.id}')">수정</button> <button class="btn btn-sm btn-danger" onclick="deleteTrade('${x.id}')">삭제</button></td></tr>`).join('')}</tbody></table>`;
}

function handleImport(e) {
  const r = new FileReader();
  r.onload = ev => {
    try { const d = JSON.parse(ev.target.result); if (!d.holdings && !d.h) throw new Error(); if (!confirm('데이터를 덮어씌울까요?')) return;
      if(d.holdings||d.h) save(K.holdings, d.holdings||d.h); if(d.watch||d.w) save(K.watch, d.watch||d.w); if(d.history||d.hi) save(K.history, d.history||d.hi); if(d.journal||d.j) save(K.journal, d.journal||d.j); if(d.cash!=null||d.c!=null) save(K.cash, d.cash!=null?d.cash:d.c);
      App.px = {}; App.fetched = false; render(); refreshPrices(); toast('📂 불러오기 완료!');
    } catch { toast('⚠️ 파일 오류'); }
  };
  r.readAsText(e.target.files[0]); e.target.value = '';
}

let cloudSyncTimer = null; function schedulePush() { clearTimeout(cloudSyncTimer); cloudSyncTimer = setTimeout(pushToCloud, 1500); }
function openCloudSetup() { $('fb-url-input').value = localStorage.getItem(K.fb)||''; $('cloudModal').classList.add('show'); }
function saveCloudUrl() { localStorage.setItem(K.fb, $('fb-url-input').value.trim()); closeModal('cloudModal'); pullFromCloud(); }
async function pushToCloud() { const u = localStorage.getItem(K.fb); if(!u) return; fetch(u+'/ptf.json', { method:'PUT', body:JSON.stringify({h:load(K.holdings), w:load(K.watch), j:load(K.journal), hi:load(K.history), c:load(K.cash)}) }).then(()=>$('cloudIndicator').textContent='☁️ 연동됨'); }
async function pullFromCloud() {
  const u = localStorage.getItem(K.fb); if(!u) return; $('cloudIndicator').textContent='☁️ 동기화 중...';
  try { const r = await fetch(u+'/ptf.json'); const d = await r.json(); if(d) { if(d.h) save(K.holdings, d.h); if(d.w) save(K.watch, d.w); if(d.j) save(K.journal, d.j); if(d.hi) save(K.history, d.hi); if(d.c!==undefined) save(K.cash, d.c); render(); refreshPrices(); $('cloudIndicator').textContent='☁️ 연동됨'; } } catch(e) { $('cloudIndicator').textContent='☁️ 오류'; }
}

// INIT
$('headerDate').textContent = new Date().toLocaleDateString('ko-KR', { month:'long', day:'numeric', weekday:'long' });
if (App.krw) $('krwToggle').classList.add('on');
pullFromCloud(); render();
if (localStorage.getItem(K.key)) refreshPrices();
</script>
</body>
